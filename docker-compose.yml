services:
  db:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: bilera
      APP_USER_PASSWORD: bilera
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4100:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    command: ["--config", "/app/config.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "4000:4000"
    environment:
      DB_USER: bilera
      DB_PASSWORD: bilera
      DB_CONNECT_STRING: db:1521/FREEPDB1
      JWT_SECRET: bilera-dev-secret-change-in-prod
      PORT: "4000"
      UPLOAD_DIR: /app/uploads
      NLS_LANG: AMERICAN_AMERICA.AL32UTF8
      LITELLM_URL: http://litellm:4000
    volumes:
      - ./backend/src:/app/src
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      litellm:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "127.0.0.1:3001:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend

volumes:
  oracle_data:
  uploads:
