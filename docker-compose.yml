services:
  db:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: bilera
      APP_USER_PASSWORD: bilera
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  oci-embeddings:
    build: ./oci-embeddings
    volumes:
      - ./backend/.oci:/root/.oci:ro
    environment:
      OCI_COMPARTMENT_ID: ocid1.tenancy.oc1..aaaaaaaa7ysb77f6zn2m3f5ifgfbwcxuu4vzjimnocf6v7yyairg6trizluq
      OCI_REGION: eu-frankfurt-1
      OCI_EMBED_MODEL: cohere.embed-multilingual-v3.0
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4100:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
      - ./backend/.oci:/root/.oci:ro
    environment:
      OCI_USER: ocid1.user.oc1..aaaaaaaangq3nsu5nygznva4soqw5xm2irj5dgugpy5hcj4qhp4e4xvuqyuq
      OCI_FINGERPRINT: "e7:29:10:1e:a0:b2:25:ef:39:49:af:d2:c6:2b:6b:6e"
      OCI_TENANCY: ocid1.tenancy.oc1..aaaaaaaa7ysb77f6zn2m3f5ifgfbwcxuu4vzjimnocf6v7yyairg6trizluq
    command: ["--config", "/app/config.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "4000:4000"
    environment:
      DB_USER: bilera
      DB_PASSWORD: bilera
      DB_CONNECT_STRING: db:1521/FREEPDB1
      JWT_SECRET: bilera-dev-secret-change-in-prod
      PORT: "4000"
      UPLOAD_DIR: /app/uploads
      NLS_LANG: AMERICAN_AMERICA.AL32UTF8
      LITELLM_URL: http://litellm:4000
      EMBEDDINGS_URL: http://oci-embeddings:8000
      DB_ADMIN_USER: bilera_admin
      DB_ADMIN_PASSWORD: bilera_admin
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: "Bilera <noreply@bilera.es>"
      APP_URL: http://localhost:3001
    volumes:
      - ./backend/src:/app/src
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      litellm:
        condition: service_healthy
      oci-embeddings:
        condition: service_healthy
      mailpit:
        condition: service_started

  landing:
    build:
      context: ./landing
      target: dev
    ports:
      - "127.0.0.1:3000:4321"
    environment:
      PUBLIC_APP_URL: http://localhost:3001
    volumes:
      - ./landing/src:/app/src

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "127.0.0.1:3001:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend

volumes:
  oracle_data:
  uploads:
