services:
  db:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${DB_USER}
      APP_USER_PASSWORD: ${DB_PASSWORD}
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    restart: unless-stopped

  oci-embeddings:
    build: ./oci-embeddings
    volumes:
      - ./.oci:/root/.oci:ro
    environment:
      OCI_COMPARTMENT_ID: ${OCI_COMPARTMENT_ID}
      OCI_REGION: ${OCI_REGION:-eu-frankfurt-1}
      OCI_EMBED_MODEL: ${OCI_EMBED_MODEL:-cohere.embed-multilingual-v3.0}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
      - ./.oci:/root/.oci:ro
    environment:
      OCI_USER: ${OCI_USER}
      OCI_FINGERPRINT: ${OCI_FINGERPRINT}
      OCI_TENANCY: ${OCI_TENANCY}
    command: ["--config", "/app/config.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: prod
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CONNECT_STRING: db:1521/FREEPDB1
      DB_ADMIN_USER: ${DB_ADMIN_USER}
      DB_ADMIN_PASSWORD: ${DB_ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "4000"
      UPLOAD_DIR: /app/uploads
      NLS_LANG: AMERICAN_AMERICA.AL32UTF8
      LITELLM_URL: http://litellm:4000
      EMBEDDINGS_URL: http://oci-embeddings:8000
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      APP_URL: https://bilera.adaptiaservices.com
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      CLOUD_TOKEN_SECRET: ${CLOUD_TOKEN_SECRET}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      litellm:
        condition: service_healthy
      oci-embeddings:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
      args:
        VITE_API_URL: /api
        VITE_MINI_SITE_DOMAIN: adaptiaservices.com
    depends_on:
      - backend
    restart: unless-stopped

  mini-sites:
    build:
      context: ./mini-sites
      target: prod
    environment:
      BACKEND_URL: http://backend:4000
      MINI_SITE_DOMAIN: adaptiaservices.com
      HOST: 0.0.0.0
      PORT: "4321"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - mini-sites
    restart: unless-stopped

volumes:
  oracle_data:
  uploads:
